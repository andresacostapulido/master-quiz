<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz Magister DevOps</title>
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.1.1/css/all.min.css">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .option-btn { transition: all 0.2s; }
        .option-btn:hover:not(:disabled) { transform: translateY(-2px); box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .correct { background-color: #16a34a !important; border-color: #16a34a !important; color: white !important; }
        .incorrect { background-color: #dc2626 !important; border-color: #dc2626 !important; color: white !important; }
        .selected { 
            border-color: #2563eb !important; 
            background-color: #dbeafe !important; 
            border-width: 4px !important;
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.2) !important;
        }
        .feedback { max-height: 0; overflow: hidden; transition: max-height 0.6s cubic-bezier(0.4,0,0.2,1), padding 0.6s cubic-bezier(0.4,0,0.2,1), opacity 0.4s, transform 0.4s; opacity: 0; transform: translateY(-10px); }
        .feedback.show { max-height: 800px; padding-top: 1.5rem; padding-bottom: 1.5rem; opacity: 1; transform: translateY(0); overflow-y: auto; }
        .progress-bar-container { width: 100%; height: 1.25rem; background-color: #e5e7eb; border-radius: 0.5rem; overflow: hidden; }
        .progress-bar { height: 100%; background-color: #2563eb; transition: width 0.4s; text-align: center; color: white; font-weight: bold; display: flex; align-items: center; justify-content: center; font-size: 0.8rem; }
    </style>
</head>
<body class="p-4 sm:p-6 md:p-8 bg-gray-100 text-gray-900">
    <!-- Selector de Asignatura -->
    <div id="subject-selector" class="max-w-4xl mx-auto">
        <header class="mb-8 text-center">
            <h1 class="text-3xl sm:text-4xl font-bold text-blue-600 mb-4">Quiz Magister DevOps</h1>
            <p class="text-gray-600">Prepárate para tus exámenes</p>
        </header>
        
        <div class="grid grid-cols-1 md:grid-cols-2 gap-4 items-start">
            <div class="bg-white p-6 rounded-xl shadow-lg hover:shadow-xl transition-all transform hover:scale-105 flex flex-col">
                <i class="fas fa-cogs text-4xl text-indigo-600 mb-3"></i>
                <h3 class="text-xl font-bold mb-2 text-gray-900">Herramientas DevOps</h3>
                <p id="question-count-herramientasdevops" class="text-sm text-gray-600 mb-4">Cargando preguntas...</p>
                
                <div class="flex-grow"></div>
                
                <div class="mt-4">
                    <label class="block text-sm font-medium mb-2">Modo:</label>
                    <select id="quiz-mode-herramientasdevops" class="w-full p-2 border rounded mb-3">
                        <option value="normal">Normal - Todos los temas</option>
                        <option value="tema">Repaso por Tema</option>
                    </select>
                </div>
                
                <div id="tema-selector-herramientasdevops" class="mt-3 hidden">
                    <label class="block text-sm font-medium mb-2">Selecciona tema:</label>
                    <select id="tema-select-herramientasdevops" class="w-full p-2 border rounded">
                        <option value="Tema 1">Tema 1: Ciclo de vida DevOps</option>
                        <option value="Tema 2">Tema 2: Componentes de aplicaciones</option>
                        <option value="Tema 3">Tema 3: Arquitectura de aplicaciones</option>
                        <option value="Tema 4">Tema 4: Packer: compilación de imágenes</option>
                        <option value="Tema 5">Tema 5: Terraform: Infraestructura como código</option>
                        <option value="Tema 6">Tema 6: Terraform: casos de uso avanzado</option>
                        <option value="Tema 7">Tema 7: Tratamiento de logs y telemetría con ElasticSearch</option>
                        <option value="Tema 8">Tema 8: Captura de logs y telemetría mediante Beats</option>
                        <option value="Tema 9">Tema 9: Dashboards con Kibana</option>
                        <option value="Tema 10">Tema 10: Monitorización del rendimiento de aplicaciones con APM</option>
                    </select>
                </div>
                
                <div class="mt-4">
                    <label class="block text-sm font-medium mb-2">Cantidad de preguntas:</label>
                    <input type="number" id="num-questions-herramientasdevops" min="5" max="30" value="10" onclick="event.stopPropagation()" class="w-full p-2 border rounded">
                </div>
                <button onclick="selectSubject('herramientasdevops')" class="mt-auto w-full bg-indigo-600 text-white font-semibold py-2 px-4 rounded-lg hover:bg-indigo-700">Comenzar Quiz</button>
            </div>

            <!-- Gestión de Proyectos -->
            <div class="bg-white p-6 rounded-xl shadow-lg hover:shadow-xl transition-all transform hover:scale-105 flex flex-col">
                <i class="fas fa-tasks text-4xl text-teal-600 mb-3"></i>
                <h3 class="text-xl font-bold mb-2 text-gray-900">Gestión de Proyectos</h3>
                <p id="question-count-gestionproyectos" class="text-sm text-gray-600 mb-4">Cargando preguntas...</p>
                
                <div class="flex-grow"></div>
                
                <div class="mt-4">
                    <label class="block text-sm font-medium mb-2">Modo:</label>
                    <select id="quiz-mode-gestionproyectos" class="w-full p-2 border rounded mb-3">
                        <option value="normal">Normal - Todos los temas</option>
                        <option value="tema">Repaso por Tema</option>
                    </select>
                </div>
                
                <div id="tema-selector-gestionproyectos" class="mt-3 hidden">
                    <label class="block text-sm font-medium mb-2">Selecciona tema:</label>
                    <select id="tema-select-gestionproyectos" class="w-full p-2 border rounded">
                        <option value="Tema 1">Tema 1: Introducción a la gestión de proyectos</option>
                        <option value="Tema 2">Tema 2: Metodologías ágiles</option>
                        <option value="Tema 3">Tema 3: Marco ágil Scrum</option>
                        <option value="Tema 4">Tema 4: Lean y Kanban</option>
                        <option value="Tema 5">Tema 5: Visión y gestión del proyecto ágil</option>
                        <option value="Tema 6">Tema 6: Estimación y planificación ágil</option>
                        <option value="Tema 7">Tema 7: Planificación del Roadmap y entregas</option>
                        <option value="Tema 8">Tema 8: Desarrollo del proyecto ágil</option>
                        <option value="Tema 9">Tema 9: Seguimiento del proyecto ágil</option>
                        <option value="Tema 10">Tema 10: Evolución en la gestión de proyectos</option>
                    </select>
                </div>
                
                <div class="mt-4">
                    <label class="block text-sm font-medium mb-2">Cantidad de preguntas:</label>
                    <input type="number" id="num-questions-gestionproyectos" min="5" max="30" value="10" onclick="event.stopPropagation()" class="w-full p-2 border rounded">
                </div>
                <button onclick="selectSubject('gestionproyectos')" class="mt-auto w-full bg-teal-600 text-white font-semibold py-2 px-4 rounded-lg hover:bg-teal-700">Comenzar Quiz</button>
            </div>

            <!-- Entornos de Integración y Entrega Continua -->
            <div class="bg-white p-6 rounded-xl shadow-lg hover:shadow-xl transition-all transform hover:scale-105 flex flex-col">
                <i class="fas fa-sync-alt text-4xl text-orange-600 mb-3"></i>
                <h3 class="text-xl font-bold mb-2 text-gray-900">Integración y Entrega Continua</h3>
                <p id="question-count-integracionentrega" class="text-sm text-gray-600 mb-4">Cargando preguntas...</p>
                
                <div class="flex-grow"></div>
                
                <div class="mt-4">
                    <label class="block text-sm font-medium mb-2">Modo:</label>
                    <select id="quiz-mode-integracionentrega" class="w-full p-2 border rounded mb-3">
                        <option value="normal">Normal - Todos los temas</option>
                        <option value="tema">Repaso por Tema</option>
                    </select>
                </div>
                
                <div id="tema-selector-integracionentrega" class="mt-3 hidden">
                    <label class="block text-sm font-medium mb-2">Selecciona tema:</label>
                    <select id="tema-select-integracionentrega" class="w-full p-2 border rounded">
                    </select>
                </div>
                
                <div class="mt-4">
                    <label class="block text-sm font-medium mb-2">Cantidad de preguntas:</label>
                    <input type="number" id="num-questions-integracionentrega" min="5" max="30" value="10" onclick="event.stopPropagation()" class="w-full p-2 border rounded">
                </div>
                <button onclick="selectSubject('integracionentrega')" class="mt-auto w-full bg-orange-600 text-white font-semibold py-2 px-4 rounded-lg hover:bg-orange-700">Comenzar Quiz</button>
            </div>

            <!-- Contenedores -->
            <div class="bg-white p-6 rounded-xl shadow-lg hover:shadow-xl transition-all transform hover:scale-105 flex flex-col">
                <i class="fas fa-cube text-4xl text-cyan-600 mb-3"></i>
                <h3 class="text-xl font-bold mb-2 text-gray-900">Contenedores</h3>
                <p id="question-count-contenedores" class="text-sm text-gray-600 mb-4">Cargando preguntas...</p>
                
                <div class="flex-grow"></div>
                
                <div class="mt-4">
                    <label class="block text-sm font-medium mb-2">Modo:</label>
                    <select id="quiz-mode-contenedores" class="w-full p-2 border rounded mb-3">
                        <option value="normal">Normal - Todos los temas</option>
                        <option value="tema">Repaso por Tema</option>
                    </select>
                </div>
                
                <div id="tema-selector-contenedores" class="mt-3 hidden">
                    <label class="block text-sm font-medium mb-2">Selecciona tema:</label>
                    <select id="tema-select-contenedores" class="w-full p-2 border rounded">
                    </select>
                </div>
                
                <div class="mt-4">
                    <label class="block text-sm font-medium mb-2">Cantidad de preguntas:</label>
                    <input type="number" id="num-questions-contenedores" min="5" max="30" value="10" onclick="event.stopPropagation()" class="w-full p-2 border rounded">
                </div>
                <button onclick="selectSubject('contenedores')" class="mt-auto w-full bg-cyan-600 text-white font-semibold py-2 px-4 rounded-lg hover:bg-cyan-700">Comenzar Quiz</button>
            </div>
        </div>
    </div>

    <!-- Quiz Container -->
    <div class="max-w-4xl mx-auto hidden" id="main-quiz-content">
        <header class="mb-8">
            <div class="flex justify-between items-center mb-4">
                <div class="flex items-center gap-4">
                    <button onclick="backToSubjects()" class="bg-gray-200 p-2 rounded-full">
                        <i class="fas fa-arrow-left"></i>
                    </button>
                    <div>
                        <h1 id="quiz-title" class="text-2xl sm:text-3xl font-bold text-blue-600"></h1>
                        <p id="question-level" class="text-sm text-gray-500 font-medium"></p>
                    </div>
                </div>
            </div>
            <div class="progress-bar-container">
                <div id="progress-bar" class="progress-bar" style="width: 0%;"></div>
            </div>
            <p id="progress-text" class="mt-2 text-md text-gray-600 text-center">Pregunta 1 de 30</p>
        </header>

        <div id="quiz-container"></div>

        <div id="navigation-controls" class="mt-6 flex justify-between items-center">
            <button id="prev-btn" onclick="prevQuestion()" class="bg-gray-600 text-white font-semibold py-2 px-5 rounded-lg shadow-md hover:bg-gray-700 disabled:opacity-50">
                Anterior
            </button>
            <div class="flex items-center gap-4">
                <button id="check-btn" onclick="checkAnswer()" class="bg-green-600 text-white font-semibold py-2 px-5 rounded-lg shadow-md hover:bg-green-700 disabled:bg-green-400">
                    Comprobar
                </button>
                <button id="next-btn" onclick="nextQuestion()" class="bg-blue-600 text-white font-semibold py-2 px-5 rounded-lg shadow-md hover:bg-blue-700 disabled:bg-blue-400">
                    Siguiente
                </button>
            </div>
        </div>

        <div id="result-container" class="hidden text-center mt-8 p-8 bg-white rounded-xl shadow-lg">
            <h2 class="text-2xl font-bold mb-4">¡Test Terminado!</h2>
            <p id="score-percentage" class="text-4xl font-bold mb-2"></p>
            <p id="result-message" class="text-2xl font-semibold mb-6"></p>
            <div id="result-details" class="text-lg mb-4"></div>
            <div id="stats-by-tema" class="mb-6"></div>
            <button onclick="restartGame()" class="bg-blue-600 text-white font-semibold py-3 px-6 rounded-lg shadow-md hover:bg-blue-700">
                <i class="fas fa-redo"></i> Volver a Jugar
            </button>
            <button onclick="backToSubjects()" class="ml-3 bg-gray-600 text-white font-semibold py-3 px-6 rounded-lg shadow-md hover:bg-gray-700">
                <i class="fas fa-home"></i> Inicio
            </button>
        </div>
    </div>

    <script>
        // Mostrar/ocultar selector de tema para todas las asignaturas
        document.addEventListener('DOMContentLoaded', () => {
            const subjects = ['herramientasdevops', 'gestionproyectos', 'integracionentrega', 'contenedores'];
            
            subjects.forEach(subject => {
                const modeSelect = document.getElementById(`quiz-mode-${subject}`);
                const temaSelector = document.getElementById(`tema-selector-${subject}`);
                if (modeSelect && temaSelector) {
                    modeSelect.addEventListener('change', (e) => {
                        temaSelector.classList.toggle('hidden', e.target.value !== 'tema');
                    });
                }
            });
        });
    </script>
    <script>
        // Cache busting automático: carga app.js con timestamp diario
        (function() {
            const script = document.createElement('script');
            const today = new Date().toISOString().split('T')[0]; // cambia cada día
            script.src = 'app.js?v=' + today;
            document.body.appendChild(script);
        })();
    </script>
</body>
</html>
